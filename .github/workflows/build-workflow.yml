name: Build Alfred Workflow

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      workflow_file: UT-Time-Converter.alfredworkflow
      source_file: ut-time-converter-source.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Show Python version
        run: python --version

      - name: Validate workflow code
        run: make test

      - name: Build source zip
        run: make build

      - name: Build Alfred workflow
        run: make build-workflow

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow
          path: UT-Time-Converter.alfredworkflow

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: ut-time-converter-source.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: workflow

      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            UT-Time-Converter.alfredworkflow
            ut-time-converter-source.zip
          generate_release_notes: true
